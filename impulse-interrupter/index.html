<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>冲动拦截器 — 先停10分钟</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <!-- 头部标语区 -->
    <header class="hero">
      <div class="logo">
        <span class="logo-icon">⏸</span>
        <span class="logo-text">冲动拦截器</span>
      </div>
      <h1 class="tagline">先别急着放纵，撑过这 10 分钟。</h1>
      <p class="subtitle">每次冲动都是一次选择。这一次，选冷静。</p>
      <div class="stats-bar">
        <div class="stat-item">
          <span class="stat-number" id="success-count">0</span>
          <span class="stat-label">次成功拦截</span>
        </div>
      </div>
    </header>

    <!-- 输入区 -->
    <main class="main-card">
      <div class="input-section">
        <label for="impulse-input" class="input-label">你现在想做什么？</label>
        <textarea
          id="impulse-input"
          class="impulse-input"
          placeholder="例如：我又想打游戏了、我想刷短视频、我不想学习了……"
          maxlength="200"
          rows="2"
          autofocus
        ></textarea>
        <div class="char-count"><span id="char-count">0</span>/200</div>
      </div>

      <!-- 强度选择 -->
      <div class="intensity-section">
        <span class="intensity-label">劝阻强度</span>
        <div class="intensity-options" role="radiogroup" aria-label="劝阻强度">
          <button class="intensity-btn" data-intensity="gentle" aria-pressed="false">
            <span class="intensity-icon">🍃</span>
            <span class="intensity-name">温和模式</span>
            <span class="intensity-desc">温柔提醒，适合敏感时刻</span>
          </button>
          <button class="intensity-btn active" data-intensity="firm" aria-pressed="true">
            <span class="intensity-icon">✋</span>
            <span class="intensity-name">坚定模式</span>
            <span class="intensity-desc">理性分析，直面冲动</span>
          </button>
          <button class="intensity-btn" data-intensity="strong" aria-pressed="false">
            <span class="intensity-icon">⚡</span>
            <span class="intensity-name">强力模式</span>
            <span class="intensity-desc">毫不留情，当头棒喝</span>
          </button>
        </div>
      </div>

      <!-- 按钮 -->
      <button id="intercept-btn" class="intercept-btn">
        <span class="btn-text">拦截冲动</span>
        <span class="btn-arrow">→</span>
      </button>

      <!-- 倒计时 -->
      <div id="countdown-section" class="countdown-section standby">
        <div class="countdown-circle">
          <svg class="countdown-svg" viewBox="0 0 120 120">
            <circle class="countdown-track" cx="60" cy="60" r="52" />
            <circle class="countdown-progress" id="countdown-progress" cx="60" cy="60" r="52" />
          </svg>
          <div class="countdown-center">
            <span class="countdown-time" id="countdown-time">10:00</span>
            <span class="countdown-subtext">剩余</span>
          </div>
        </div>
        <p class="countdown-message">输入冲动内容，点击「拦截冲动」开始 10 分钟倒计时。</p>
        <div class="countdown-actions">
          <button id="countdown-done-btn" class="countdown-done-btn hidden">✓ 我做到了</button>
          <button id="countdown-giveup-btn" class="countdown-giveup-btn hidden">我没忍住...</button>
        </div>

        <!-- 任务卡片 -->
        <div id="task-card" class="task-card hidden">
          <div class="task-progress" id="task-progress">第 1 步 / 4 步</div>
          <div id="breathing-guide" class="breathing-guide hidden">
            <div class="breathing-orb"></div>
            <p>吸气 4 秒，呼气 6 秒</p>
          </div>
          <h3 class="task-title" id="task-title"></h3>
          <p class="task-content" id="task-content"></p>
          <button id="task-next-btn" class="task-next-btn">我完成了，下一步</button>
        </div>
      </div>

      <!-- 复盘表单 -->
      <div id="review-section" class="review-section hidden">
        <h3 class="review-title">📝 失败复盘</h3>
        <p class="review-intro">没关系，这不是失败，是一次数据。让我们看看刚才发生了什么。</p>

        <div class="review-question">
          <label class="review-label">1. 刚才的冲动是什么？</label>
          <input type="text" id="review-impulse" class="review-input" readonly />
        </div>

        <div class="review-question">
          <label class="review-label">2. 刚才最主要的诱因是什么？</label>
          <div class="review-options" id="trigger-options"></div>
        </div>

        <div class="review-question">
          <label class="review-label">3. 下次同样情况出现时，你愿意先做哪一个动作？</label>
          <div class="review-options" id="action-options"></div>
        </div>

        <button id="review-submit-btn" class="review-submit-btn" disabled>生成复盘</button>
      </div>

      <!-- 复盘结果卡片 -->
      <div id="review-result-card" class="review-result-card hidden">
        <div class="review-result-header">
          <span class="review-result-icon">📋</span>
          <span class="review-result-title">复盘结果</span>
        </div>
        <p class="review-result-text" id="review-result-text"></p>
        <div class="review-advice" id="review-advice"></div>
        <button id="review-dismiss-btn" class="review-dismiss-btn">知道了</button>
      </div>

      <!-- 结果卡片 -->
      <div id="result-card" class="result-card hidden">
        <div class="result-header">
          <span class="result-badge" id="result-badge"></span>
          <span class="result-timestamp" id="result-timestamp"></span>
        </div>

        <div class="result-block" id="stop-signal">
          <h3 class="block-title">🛑 停下来</h3>
          <p class="block-content"></p>
        </div>

        <div class="result-block" id="reason-analysis">
          <h3 class="block-title">🧠 冲动从哪来</h3>
          <p class="block-content"></p>
        </div>

        <div class="result-block" id="consequence">
          <h3 class="block-title">⚠️ 如果现在放纵</h3>
          <p class="block-content"></p>
        </div>

        <div class="result-block alternative-block" id="alternative">
          <h3 class="block-title">🎯 先做这个，就 10 分钟</h3>
          <p class="block-content"></p>
        </div>

        <div class="result-block cta-block" id="action-reminder">
          <p class="cta-text"></p>
        </div>

        <button id="new-intercept-btn" class="new-intercept-btn">拦截另一个冲动</button>
      </div>
    </main>

    <!-- 最近复盘 -->
    <section class="recent-reviews-section" id="recent-reviews-section">
      <h3 class="recent-reviews-title">最近复盘</h3>
      <div id="recent-reviews-list" class="recent-reviews-list">
        <p class="recent-reviews-empty">暂无复盘记录</p>
      </div>
    </section>

    <!-- 底部 -->
    <footer class="footer">
      <p>冲动会过去。你比它强大。</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
